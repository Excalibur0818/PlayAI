<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围住小猫 - PlayAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['DM Sans', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        'apple-gray': '#f5f5f7',
                        'apple-dark': '#1d1d1f',
                        'apple-blue': '#0071e3',
                        'apple-border': '#d2d2d7',
                        'apple-text': '#86868b',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out',
                        'bounce-in': 'bounceIn 0.5s ease-out',
                        'shake': 'shake 0.5s ease-out',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        bounceIn: {
                            '0%': { transform: 'scale(0)' },
                            '50%': { transform: 'scale(1.1)' },
                            '100%': { transform: 'scale(1)' },
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '25%': { transform: 'translateX(-5px)' },
                            '75%': { transform: 'translateX(5px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-font-smoothing: antialiased;
        }
        body {
            background: linear-gradient(180deg, #ffffff 0%, #f5f5f7 100%);
            min-height: 100vh;
        }
        .game-board-shell {
            background:
                radial-gradient(circle at top, rgba(0, 113, 227, 0.12), transparent 42%),
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.7));
        }
        .hex-row {
            display: flex;
            gap: 0.45rem;
            margin-top: -0.42rem;
        }
        .hex-row:first-child {
            margin-top: 0;
        }
        .hex-row.offset {
            margin-left: 1.45rem;
        }
        .game-cell {
            width: 2.7rem;
            height: 2.7rem;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                0 10px 18px rgba(17, 24, 39, 0.08);
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .game-cell:hover:not(.occupied):not(.cat) {
            transform: translateY(-1px) scale(1.04);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.95),
                0 12px 22px rgba(0, 113, 227, 0.16);
        }
        .cat-icon {
            animation: catBounce 1s ease-in-out infinite;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.18));
        }
        @keyframes catBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .wall {
            background: radial-gradient(circle at 30% 30%, #4b4b4f 0%, #1d1d1f 70%);
        }
        .board-edge {
            background: radial-gradient(circle at 30% 30%, #eff7ff 0%, #d7e9ff 72%);
        }
        .board-empty {
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #eff0f6 72%);
        }
        .win-glow {
            box-shadow: 0 0 60px rgba(34, 197, 94, 0.4);
        }
        .lose-glow {
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.4);
        }
        .difficulty-chip {
            transition: all 0.2s ease;
        }
        .difficulty-chip:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12);
        }
        .stats-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(245, 245, 247, 0.9));
        }
        .stats-card.active {
            border-color: rgba(0, 113, 227, 0.25);
            box-shadow: 0 14px 32px rgba(0, 113, 227, 0.1);
        }
        @media (max-width: 640px) {
            .hex-row.offset {
                margin-left: 1.15rem;
            }
            .game-cell {
                width: 2.3rem;
                height: 2.3rem;
            }
        }
    </style>
</head>
<body class="font-sans text-apple-dark">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <div class="w-9 h-9 bg-gradient-to-br from-apple-dark to-gray-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-microchip text-white text-sm"></i>
                </div>
                <span class="font-semibold">PlayAI</span>
            </a>
            <a href="index.html#tools" class="text-sm text-apple-text hover:text-apple-dark transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>返回工具

    </nav>

    <main class="pt-28 pb-12 px-4">
        <div class="max-w-xl mx-auto">
            <div class="text-center mb-8 animate-fade-in-up">
                <div class="inline-flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100 mb-4">
                    <i class="fas fa-paw text-apple-blue"></i>
                    <span class="text-sm font-medium">益智游戏</span>

                <h1 class="text-3xl font-semibold mb-2">围住小猫</h1>
                <p class="text-apple-text text-sm">蜂窝圆点版更接近原作视觉，小猫还会故意摆出诱导走位，专门骗你下错那一堵墙。</p>
            </div>

            <div class="mb-6 bg-white rounded-2xl p-4 shadow-sm border border-gray-100 animate-fade-in-up space-y-4">

                    <div class="text-center">

                    </div>

                        <p class="text-xs text-apple-text mb-1">状态</p>

                    </div>
                    <div class="text-center">

                    <button onclick="initGame()" class="px-4 py-2 bg-apple-dark text-white rounded-full text-sm font-medium hover:bg-gray-800 transition-colors">

            <div class="mt-8 bg-white/50 rounded-2xl p-5 border border-gray-100 animate-fade-in-up">

                </h3>

                        <i class="fas fa-check text-green-500 mt-1"></i>
                        <span>每放置一个障碍物，小猫会先看眼前，再预判你下一堵墙后的局面</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <i class="fas fa-check text-green-500 mt-1"></i>
                        <span>老六模式会故意站在你最想封却又很难真正封死的位置，专门诱导你失误</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <i class="fas fa-check text-green-500 mt-1"></i>
                        <span>页面会自动记录本地胜率和各难度最佳步数，能直观看出难度差异</span>

    <script>
        const BOARD_SIZE = 11;
        const STATS_STORAGE_KEY = 'playai_catch_cat_stats';
        const DIFFICULTY_SETTINGS = {
            normal: {
                label: '普通',
                hint: '会找最近出口，但偶尔还算讲理。',
                wallForecastCount: 3,
                lookaheadDepth: 2,
                tieWindow: 45,
                tieRandomness: 0.28,
                initialObstacles: 10,
                trapPenalty: 0.9,
                threatWeight: 0.75
            },
            cunning: {
                label: '狡猾',
                hint: '会绕开你最想堵的点，开始像真猫了。',
                wallForecastCount: 5,
                lookaheadDepth: 2,
                tieWindow: 24,
                tieRandomness: 0.14,
                initialObstacles: 9,
                trapPenalty: 1.1,
                threatWeight: 1
            },
            trickster: {
                label: '老六',
                hint: '不只会逃，还会故意站在你最想封却最难封死的蜂窝口。',
                wallForecastCount: 7,
                lookaheadDepth: 2,
                tieWindow: 10,
                tieRandomness: 0.04,
                initialObstacles: 8,
                trapPenalty: 1.3,
                threatWeight: 1.25,
                baitWeight: 1.3
            }
        };

        let board = [];
        let catPosition = { x: 0, y: 0 };
        let stepCount = 0;
        let gameOver = false;
        let currentDifficulty = 'normal';
        let gameRecorded = false;
        let gameStats = createEmptyStats();

        function createEmptyStats() {
            return {
                totalGames: 0,
                wins: 0,
                losses: 0,
                byDifficulty: {
                    normal: { games: 0, wins: 0, bestSteps: null },
                    cunning: { games: 0, wins: 0, bestSteps: null },
                    trickster: { games: 0, wins: 0, bestSteps: null }
                }
            };
        }

        function loadStats() {
            try {
                const saved = localStorage.getItem(STATS_STORAGE_KEY);
                if (!saved) {
                    return createEmptyStats();
                }

                const parsed = JSON.parse(saved);
                const empty = createEmptyStats();
                return {
                    totalGames: parsed.totalGames || 0,
                    wins: parsed.wins || 0,
                    losses: parsed.losses || 0,
                    byDifficulty: {
                        normal: { ...empty.byDifficulty.normal, ...(parsed.byDifficulty?.normal || {}) },
                        cunning: { ...empty.byDifficulty.cunning, ...(parsed.byDifficulty?.cunning || {}) },
                        trickster: { ...empty.byDifficulty.trickster, ...(parsed.byDifficulty?.trickster || {}) }
                    }
                };
            } catch (error) {
                return createEmptyStats();
            }
        }

        function saveStats() {
            localStorage.setItem(STATS_STORAGE_KEY, JSON.stringify(gameStats));
        }

        function getWinRate(wins, games) {
            return games === 0 ? '0%' : `${Math.round((wins / games) * 100)}%`;
        }

        function getDifficultyConfig() {
            return DIFFICULTY_SETTINGS[currentDifficulty];
        }

        function getHexDirections(row) {
            if (row % 2 === 0) {
                return [
                    { dx: -1, dy: -1 },
                    { dx: 0, dy: -1 },
                    { dx: -1, dy: 0 },
                    { dx: 1, dy: 0 },
                    { dx: -1, dy: 1 },
                    { dx: 0, dy: 1 }
                ];
            }

            return [
                { dx: 0, dy: -1 },
                { dx: 1, dy: -1 },
                { dx: -1, dy: 0 },
                { dx: 1, dy: 0 },
                { dx: 0, dy: 1 },
                { dx: 1, dy: 1 }
            ];
        }

        function getNeighbors(x, y) {
            return getHexDirections(y)
                .map((direction) => ({ x: x + direction.dx, y: y + direction.dy }))
                .filter((position) => (
                    position.x >= 0 &&
                    position.x < BOARD_SIZE &&
                    position.y >= 0 &&
                    position.y < BOARD_SIZE
                ));
        }

        function getValidMoves(x, y) {
            return getNeighbors(x, y).filter((position) => board[position.y][position.x] === 0);
        }

        function isAtEdge(x, y) {
            return x === 0 || x === BOARD_SIZE - 1 || y === 0 || y === BOARD_SIZE - 1;
        }

        function getBoardSnapshot() {
            return board.map((row) => [...row]);
        }

        function restoreBoard(snapshot) {
            board = snapshot.map((row) => [...row]);
        }

        function getHexDistance(ax, ay, bx, by) {
            const aCol = ax - (ay - (ay & 1)) / 2;
            const aZ = ay;
            const aY = -aCol - aZ;
            const bCol = bx - (by - (by & 1)) / 2;
            const bZ = by;
            const bY = -bCol - bZ;

            return Math.max(
                Math.abs(aCol - bCol),
                Math.abs(aY - bY),
                Math.abs(aZ - bZ)
            );
        }

        function updateDifficultyUI() {
            const config = getDifficultyConfig();
            document.getElementById('difficultyLabel').textContent = config.label;
            document.getElementById('difficultyHint').textContent = config.hint;

            document.querySelectorAll('[data-difficulty]').forEach((button) => {
                const isActive = button.dataset.difficulty === currentDifficulty;
                button.className = `difficulty-chip px-3 py-2 rounded-full text-sm font-medium border transition-colors ${
                    isActive
                        ? 'border-apple-blue bg-apple-blue text-white shadow-sm'
                        : 'border-gray-200 bg-gray-50 text-apple-dark hover:bg-gray-100'
                }`;
            });
        }

        function renderStats() {
            const overviewEl = document.getElementById('statsOverview');
            const statsGridEl = document.getElementById('statsGrid');
            const overallWinRate = getWinRate(gameStats.wins, gameStats.totalGames);

            overviewEl.innerHTML = `
                <div>
                    <p class="text-[11px] text-apple-text mb-1">总局数</p>
                    <p class="text-xl font-semibold">${gameStats.totalGames}</p>
                </div>
                <div>
                    <p class="text-[11px] text-apple-text mb-1">胜率</p>
                    <p class="text-xl font-semibold">${overallWinRate}</p>
                </div>
                <div>
                    <p class="text-[11px] text-apple-text mb-1">最佳纪录</p>
                    <p class="text-xl font-semibold">${getBestRecordSummary()}</p>
                </div>
            `;

            statsGridEl.innerHTML = Object.entries(DIFFICULTY_SETTINGS).map(([key, config]) => {
                const stats = gameStats.byDifficulty[key];
                const best = stats.bestSteps === null ? '--' : `${stats.bestSteps}步`;
                const rate = getWinRate(stats.wins, stats.games);
                const activeClass = key === currentDifficulty ? 'active' : '';

                return `
                    <div class="stats-card ${activeClass} rounded-2xl border border-gray-100 px-3 py-3">
                        <p class="text-xs font-semibold mb-1">${config.label}</p>
                        <p class="text-[11px] text-apple-text">${rate}</p>
                        <p class="text-[11px] text-apple-text mt-1">${stats.games}局</p>
                        <p class="text-sm font-semibold mt-2">${best}</p>
                    </div>
                `;
            }).join('');
        }

        function getBestRecordSummary() {
            const bestValues = Object.values(gameStats.byDifficulty)
                .map((stats) => stats.bestSteps)
                .filter((value) => value !== null);

            if (bestValues.length === 0) {
                return '--';
            }

            return `${Math.min(...bestValues)}步`;
        }

        function recordGameResult(didWin) {
            if (gameRecorded) {
                return;
            }

            gameRecorded = true;
            gameStats.totalGames += 1;
            if (didWin) {
                gameStats.wins += 1;
            } else {
                gameStats.losses += 1;
            }

            const difficultyStats = gameStats.byDifficulty[currentDifficulty];
            difficultyStats.games += 1;
            if (didWin) {
                difficultyStats.wins += 1;
                if (difficultyStats.bestSteps === null || stepCount < difficultyStats.bestSteps) {
                    difficultyStats.bestSteps = stepCount;
                }
            }

            saveStats();
        }

        function initGame() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
            stepCount = 0;
            gameOver = false;
            gameRecorded = false;

            catPosition = {
                x: Math.floor(BOARD_SIZE / 2),
                y: Math.floor(BOARD_SIZE / 2)
            };

            let placed = 0;
            const obstacleCount = getDifficultyConfig().initialObstacles;
            while (placed < obstacleCount) {
                const x = Math.floor(Math.random() * BOARD_SIZE);
                const y = Math.floor(Math.random() * BOARD_SIZE);
                if (board[y][x] === 0 && (x !== catPosition.x || y !== catPosition.y)) {
                    board[y][x] = 1;
                    placed++;
                }
            }

            updateUI();
        }

        function updateUI() {
            updateDifficultyUI();
            renderStats();
            document.getElementById('stepCount').textContent = stepCount;
            document.getElementById('gameStatus').textContent = gameOver
                ? (checkWin() ? '胜利！🎉' : '失败😢')
                : '进行中';
            document.getElementById('gameStatus').className = `text-sm font-medium ${
                gameOver ? (checkWin() ? 'text-green-500' : 'text-red-500') : 'text-apple-blue'
            }`;

            renderBoard();
        }

        function renderBoard() {
            const boardEl = document.getElementById('gameBoard');
            boardEl.innerHTML = '';

            for (let y = 0; y < BOARD_SIZE; y++) {
                const row = document.createElement('div');
                row.className = `hex-row ${y % 2 === 1 ? 'offset' : ''}`;

                for (let x = 0; x < BOARD_SIZE; x++) {
                    const cell = document.createElement('div');
                    const isCat = x === catPosition.x && y === catPosition.y;
                    const isWall = board[y][x] === 1;
                    const isEdge = isAtEdge(x, y);

                    cell.className = `game-cell flex items-center justify-center cursor-pointer text-lg ${
                        isCat ? 'cat bg-yellow-100' :
                        isWall ? 'wall' :
                        isEdge ? 'board-edge' : 'board-empty'
                    } ${isCat ? 'cat' : ''} ${isWall ? 'occupied' : ''}`;

                    if (isCat) {
                        cell.innerHTML = '<i class="fas fa-cat cat-icon text-2xl"></i>';
                    } else if (!isWall) {
                        cell.onclick = () => handleCellClick(x, y);
                    }

                    row.appendChild(cell);
                }

                boardEl.appendChild(row);
            }

            if (gameOver) {
                if (checkWin()) {
                    boardEl.classList.add('win-glow');
                    boardEl.classList.remove('lose-glow');
                } else {
                    boardEl.classList.add('lose-glow');
                    boardEl.classList.remove('win-glow');
                }
            } else {
                boardEl.classList.remove('win-glow', 'lose-glow');
            }
        }

        function handleCellClick(x, y) {
            if (gameOver || board[y][x] !== 0) {
                return;
            }

            board[y][x] = 1;
            stepCount++;

            if (checkWin()) {
                gameOver = true;
                recordGameResult(true);
                updateUI();
                return;
            }

            moveCat();

            if (isAtEdge(catPosition.x, catPosition.y)) {
                gameOver = true;
                recordGameResult(false);
                updateUI();
                return;
            }

            if (checkWin()) {
                gameOver = true;
                recordGameResult(true);
            }

            updateUI();
        }

        function getReachabilityMetrics(startX, startY) {
            const visited = new Set();
            const queue = [{ x: startX, y: startY, dist: 0 }];
            let head = 0;
            let area = 0;
            let edgeCells = 0;
            let shortestEdgeDistance = null;

            visited.add(`${startX},${startY}`);

            while (head < queue.length) {
                const current = queue[head++];
                area++;

                if (isAtEdge(current.x, current.y)) {
                    edgeCells++;
                    if (shortestEdgeDistance === null) {
                        shortestEdgeDistance = current.dist;
                    }
                }

                for (const next of getNeighbors(current.x, current.y)) {
                    const key = `${next.x},${next.y}`;
                    if (board[next.y][next.x] !== 0 || visited.has(key)) {
                        continue;
                    }

                    visited.add(key);
                    queue.push({ x: next.x, y: next.y, dist: current.dist + 1 });
                }
            }

            return {
                area,
                edgeCells,
                shortestEdgeDistance
            };
        }

        function getEscapeRoutes(startX, startY) {
            const visited = new Set();
            const queue = [{ x: startX, y: startY, dist: 0 }];
            let head = 0;
            let shortestDistance = Infinity;
            let routeCount = 0;

            visited.add(`${startX},${startY}`);

            while (head < queue.length) {
                const current = queue[head++];
                if (current.dist > shortestDistance) {
                    continue;
                }

                if (isAtEdge(current.x, current.y)) {
                    shortestDistance = current.dist;
                    routeCount++;
                    continue;
                }

                for (const next of getNeighbors(current.x, current.y)) {
                    const key = `${next.x},${next.y}`;
                    if (board[next.y][next.x] !== 0 || visited.has(key)) {
                        continue;
                    }

                    visited.add(key);
                    queue.push({ x: next.x, y: next.y, dist: current.dist + 1 });
                }
            }

            return {
                shortestDistance: Number.isFinite(shortestDistance) ? shortestDistance : null,
                routeCount
            };
        }

        function countAdjacentWalls(x, y) {
            let wallCount = 0;
            for (const neighbor of getNeighbors(x, y)) {
                if (board[neighbor.y][neighbor.x] === 1) {
                    wallCount++;
                }
            }
            return wallCount;
        }

        function distanceToClosestEdge(x, y) {
            return Math.min(x, y, BOARD_SIZE - 1 - x, BOARD_SIZE - 1 - y);
        }

        function estimateFutureSafety(x, y) {
            const followUpMoves = getValidMoves(x, y);
            if (followUpMoves.length === 0) {
                return -800;
            }

            let bestFollowUpScore = -Infinity;

            for (const move of followUpMoves) {
                const reachability = getReachabilityMetrics(move.x, move.y);
                const routes = getEscapeRoutes(move.x, move.y);
                const mobility = getValidMoves(move.x, move.y).length;

                let score = reachability.area * 5 + mobility * 32 + routes.routeCount * 24;
                if (routes.shortestDistance !== null) {
                    score += 320 - routes.shortestDistance * 42;
                } else {
                    score -= 140;
                }

                score -= countAdjacentWalls(move.x, move.y) * 55;
                bestFollowUpScore = Math.max(bestFollowUpScore, score);
            }

            return bestFollowUpScore;
        }

        function getCandidateWalls(maxCount, fromPosition) {
            const candidates = [];
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let column = 0; column < BOARD_SIZE; column++) {
                    if (board[row][column] !== 0 || (column === fromPosition.x && row === fromPosition.y)) {
                        continue;
                    }

                    const distance = getHexDistance(column, row, fromPosition.x, fromPosition.y);
                    if (distance > 3) {
                        continue;
                    }

                    const adjacencyToCat = getNeighbors(fromPosition.x, fromPosition.y)
                        .some((neighbor) => neighbor.x === column && neighbor.y === row);
                    const edgeBias = isAtEdge(column, row) ? 40 : 0;
                    const centralityPenalty = distance * 12;

                    candidates.push({
                        x: column,
                        y: row,
                        priority: (adjacencyToCat ? 180 : 0) + edgeBias - centralityPenalty
                    });
                }
            }

            candidates.sort((left, right) => right.priority - left.priority);
            return candidates.slice(0, maxCount);
        }

        function getBaitScore(x, y, config) {
            if (currentDifficulty !== 'trickster') {
                return 0;
            }

            const candidateWalls = getCandidateWalls(4, { x, y });
            if (candidateWalls.length === 0) {
                return 0;
            }

            let baitScore = 0;

            for (const candidate of candidateWalls) {
                const snapshot = getBoardSnapshot();
                board[candidate.y][candidate.x] = 1;

                const responseMoves = getValidMoves(x, y);
                const routesAfterWall = getEscapeRoutes(x, y);
                const stillEscapable = routesAfterWall.shortestDistance !== null;
                const responseBonus = responseMoves.length >= 2 ? 130 : 0;
                const routeBonus = stillEscapable ? routesAfterWall.routeCount * 42 : -160;
                const lureBonus = getHexDistance(candidate.x, candidate.y, x, y) === 1 ? 68 : 28;

                baitScore = Math.max(baitScore, responseBonus + routeBonus + lureBonus);
                restoreBoard(snapshot);
            }

            const nearbyWalls = countAdjacentWalls(x, y);
            const pressureBonus = nearbyWalls >= 2 && nearbyWalls <= 3 ? 110 : 0;
            const mobility = getValidMoves(x, y).length;
            const mobilityBonus = mobility >= 2 && mobility <= 4 ? 90 : 0;

            return (baitScore + pressureBonus + mobilityBonus) * (config.baitWeight || 1);
        }

        function scoreBoardForCat(x, y, config) {
            if (isAtEdge(x, y)) {
                return Number.MAX_SAFE_INTEGER;
            }

            const reachability = getReachabilityMetrics(x, y);
            const routes = getEscapeRoutes(x, y);
            const mobility = getValidMoves(x, y).length;
            const nearbyWalls = countAdjacentWalls(x, y);
            const futureSafety = estimateFutureSafety(x, y);
            const edgeDistance = distanceToClosestEdge(x, y);
            const baitScore = getBaitScore(x, y, config);

            let score = reachability.area * 16;
            score += mobility * 94;
            score += futureSafety;
            score -= nearbyWalls * 128 * config.trapPenalty;
            score -= edgeDistance * 12;

            if (routes.shortestDistance !== null) {
                score += 4600 - routes.shortestDistance * 280;
                score += routes.routeCount * 90;
            } else {
                score -= 1800;
            }

            if (reachability.shortestEdgeDistance !== null) {
                score += 2200 - reachability.shortestEdgeDistance * 120;
                score += reachability.edgeCells * 55;
            } else {
                score -= 950;
            }

            score += baitScore;

            return score;
        }

        function forecastPlayerWall(move, config) {
            const snapshot = getBoardSnapshot();
            const originalCat = { ...catPosition };
            catPosition = { ...move };

            const candidateWalls = getCandidateWalls(config.wallForecastCount, move);
            let bestWall = null;
            let strongestThreat = -Infinity;

            for (const candidate of candidateWalls) {
                board[candidate.y][candidate.x] = 1;
                const threat = -scoreBoardForCat(move.x, move.y, config);
                board[candidate.y][candidate.x] = 0;

                if (threat > strongestThreat) {
                    strongestThreat = threat;
                    bestWall = candidate;
                }
            }

            restoreBoard(snapshot);
            catPosition = originalCat;

            return {
                wall: bestWall,
                threat: strongestThreat > -Infinity ? strongestThreat : 0
            };
        }

        function evaluateMove(x, y, lookaheadDepth) {
            const config = getDifficultyConfig();
            let score = scoreBoardForCat(x, y, config);

            if (lookaheadDepth > 0) {
                const forecast = forecastPlayerWall({ x, y }, config);
                score -= forecast.threat * 0.55 * config.threatWeight;

                if (lookaheadDepth > 1 && forecast.wall) {
                    const snapshot = getBoardSnapshot();
                    const originalCat = { ...catPosition };

                    catPosition = { x, y };
                    board[forecast.wall.y][forecast.wall.x] = 1;

                    const responseMoves = getValidMoves(x, y);
                    if (responseMoves.length === 0) {
                        score -= 2800;
                    } else {
                        let bestResponse = -Infinity;
                        for (const response of responseMoves) {
                            bestResponse = Math.max(bestResponse, scoreBoardForCat(response.x, response.y, config));
                        }
                        score += bestResponse * 0.72;
                    }

                    restoreBoard(snapshot);
                    catPosition = originalCat;
                }
            }

            return score;
        }

        function moveCat() {
            const config = getDifficultyConfig();
            const moves = getValidMoves(catPosition.x, catPosition.y);
            if (moves.length === 0) {
                return;
            }

            const evaluatedMoves = moves.map((move) => ({
                move,
                score: evaluateMove(move.x, move.y, config.lookaheadDepth)
            }));

            evaluatedMoves.sort((left, right) => right.score - left.score);

            const bestScore = evaluatedMoves[0].score;
            const nearBestMoves = evaluatedMoves.filter((item) => item.score >= bestScore - config.tieWindow);
            const choicePool = Math.random() < config.tieRandomness ? nearBestMoves : [nearBestMoves[0]];
            const selectedMove = choicePool[Math.floor(Math.random() * choicePool.length)];

            catPosition = selectedMove.move;
        }

        function checkWin() {
            return getValidMoves(catPosition.x, catPosition.y).length === 0;
        }

        gameStats = loadStats();

        document.querySelectorAll('[data-difficulty]').forEach((button) => {
            button.addEventListener('click', () => {
                const nextDifficulty = button.dataset.difficulty;
                if (!nextDifficulty || nextDifficulty === currentDifficulty) {
                    return;
                }

                currentDifficulty = nextDifficulty;
                initGame();
            });
        });

        initGame();
    </script>
</body>
